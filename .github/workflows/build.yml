name: Build PassQuantum

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# All three jobs run on ubuntu-latest to mirror build.sh exactly:
#   • Linux  → native CGO build
#   • Windows → fyne-cross windows (Docker)
#   • macOS  → fyne-cross darwin  (Docker + phracker MacOSX11.3 SDK)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux native build  (mirrors: build.sh linux)
  # PyInstaller bundles the Python face-guard into the Go binary via
  # go:embed + the "with_face_bundle" build tag.
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: new-passquantum/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Fyne CGO dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            xorg-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Install Python dependencies + PyInstaller
        working-directory: new-passquantum
        run: |
          pip install --quiet -r requirements.txt pyinstaller

      - name: Build Python bundle with PyInstaller
        working-directory: new-passquantum
        run: |
          python -m PyInstaller \
            --onefile \
            --name face_guard_bundle \
            --distpath ui \
            --workpath /tmp/passquantum_pyinstaller_work \
            --specpath /tmp/passquantum_pyinstaller_spec \
            --add-data "models:models" \
            --collect-all mediapipe \
            --hidden-import cv2 \
            --hidden-import numpy \
            --noconfirm \
            --clean \
            face_guard.py

      - name: Build Linux binary (with embedded Python bundle)
        working-directory: new-passquantum
        run: |
          mkdir -p build/linux
          CGO_ENABLED=1 go build -tags with_face_bundle -v \
            -o build/linux/PassQuantum ./ui

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-linux-amd64
          path: new-passquantum/build/linux/PassQuantum
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Windows cross-build via fyne-cross + Docker
  # (mirrors: fyne-cross windows -arch=amd64 ...)
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: new-passquantum/go.sum

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build Windows binary (fyne-cross)
        working-directory: new-passquantum
        run: |
          fyne-cross windows \
            -arch=amd64 \
            -app-id=com.passquantum.app \
            -name="PassQuantum" \
            -icon=Icon.png \
            ./ui

      - name: Copy Python source files into Windows dist
        working-directory: new-passquantum
        run: |
          mkdir -p fyne-cross/dist/windows-amd64/PassQuantum_AppData
          cp face_guard.py geometric_encoder.py liveness_detector.py \
             face_authenticator.py \
             fyne-cross/dist/windows-amd64/PassQuantum_AppData/
          cp -r models fyne-cross/dist/windows-amd64/PassQuantum_AppData/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-windows-amd64
          path: new-passquantum/fyne-cross/dist/windows-amd64/
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # macOS cross-build via fyne-cross + Docker + phracker MacOSX11.3 SDK
  # (mirrors: fyne-cross darwin -arch=* --macosx-sdk-path=... ./ui)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: new-passquantum/go.sum

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Download MacOSX11.3 SDK
        run: |
          mkdir -p /tmp/SDKs
          curl -fsSL \
            "https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz" \
            -o /tmp/MacOSX11.3.sdk.tar.xz
          tar -xf /tmp/MacOSX11.3.sdk.tar.xz -C /tmp/SDKs/

      - name: Build macOS binary (fyne-cross)
        working-directory: new-passquantum
        run: |
          fyne-cross darwin \
            -arch=* \
            -app-id=com.passquantum.app \
            -name="PassQuantum" \
            -icon=Icon.png \
            --macosx-sdk-path=/tmp/SDKs/MacOSX11.3.sdk \
            ./ui

      - name: Copy face_guard.py into macOS dist
        working-directory: new-passquantum
        run: cp face_guard.py fyne-cross/dist/darwin-amd64/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-macos-amd64
          path: new-passquantum/fyne-cross/dist/darwin-amd64/
          if-no-files-found: error
