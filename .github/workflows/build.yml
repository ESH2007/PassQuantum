name: Build PassQuantum

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# All three jobs run on ubuntu-latest to mirror build.sh exactly:
#   • Linux  → native CGO build
#   • Windows → fyne-cross windows (Docker)
#   • macOS  → fyne-cross darwin  (Docker + phracker MacOSX11.3 SDK)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Linux native build  (mirrors: build.sh linux)
  # PyInstaller bundles the Python face-guard into the Go binary via
  # go:embed + the "with_face_bundle" build tag.
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build — Linux (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Fyne CGO dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            xorg-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install --quiet -r python/requirements.txt pyinstaller

      - name: Build Python bundle with PyInstaller
        run: |
          PROJECT_ROOT="$(pwd)"
          python -m PyInstaller \
            --onefile \
            --name face_guard_bundle \
            --distpath ui \
            --workpath /tmp/passquantum_pyinstaller_work \
            --specpath /tmp/passquantum_pyinstaller_spec \
            --paths "${PROJECT_ROOT}/python" \
            --add-data "${PROJECT_ROOT}/models:models" \
            --collect-all mediapipe \
            --hidden-import cv2 \
            --hidden-import numpy \
            --noconfirm \
            --clean \
            "${PROJECT_ROOT}/python/face_guard.py"

      - name: Build Linux binary (with embedded Python bundle)
        run: |
          mkdir -p build/linux
          CGO_ENABLED=1 go build -tags with_face_bundle -v \
            -o build/linux/PassQuantum ./ui

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-linux-amd64
          path: build/linux/PassQuantum
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Windows native build via Build-FaceBundle.ps1
  # Runs on a real Windows runner so PyInstaller can produce a native .exe
  # and CGO (MinGW) can link the Fyne UI.  The Python bundle is embedded
  # directly into PassQuantum.exe via go:embed + -tags with_face_bundle.
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build — Windows (amd64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MinGW (C compiler for CGO)
        run: choco install mingw --yes --no-progress

      - name: Build Windows binary (PowerShell — embedded Python bundle)
        shell: pwsh
        run: .\Build-FaceBundle.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-windows-amd64
          path: build/windows/PassQuantum.exe
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # macOS cross-build via fyne-cross + Docker + phracker MacOSX11.3 SDK
  # (mirrors: fyne-cross darwin -arch=* --macosx-sdk-path=... ./ui)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build — macOS (amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.sum

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Download MacOSX11.3 SDK
        run: |
          mkdir -p /tmp/SDKs
          curl -fsSL \
            "https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz" \
            -o /tmp/MacOSX11.3.sdk.tar.xz
          tar -xf /tmp/MacOSX11.3.sdk.tar.xz -C /tmp/SDKs/

      - name: Build macOS binary (fyne-cross)
        run: |
          fyne-cross darwin \
            -arch=* \
            -app-id=com.passquantum.app \
            -name="PassQuantum" \
            -icon=Icon.png \
            --macosx-sdk-path=/tmp/SDKs/MacOSX11.3.sdk \
            ./ui

      - name: Copy face_guard Python files into macOS dist
        run: |
          mkdir -p fyne-cross/dist/darwin-amd64/python
          cp python/face_guard.py python/geometric_encoder.py \
             python/liveness_detector.py python/face_authenticator.py \
             fyne-cross/dist/darwin-amd64/python/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PassQuantum-macos-amd64
          path: fyne-cross/dist/darwin-amd64/
          if-no-files-found: error
